name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG)'
        required: true
        type: string

jobs:
  build:
    name: Web to APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Setup PWA to APK
        run: |
          # Clone PWA to APK converter
          git clone https://github.com/sanandrea/pwa-to-apk.git
          cd pwa-to-apk
          npm install

      - name: Download icon
        run: |
          curl -L -o icon.png "${{ inputs.icon_url }}"
          file icon.png

      - name: Convert Web to APK
        run: |
          cd pwa-to-apk
          node index.js \
            --url "${{ inputs.web_url }}" \
            --name "${{ inputs.app_name }}" \
            --icon ../icon.png \
            --output ../app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-apk
          path: app.apk
          if-no-files-found: error
