name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG) - Bisa URL file langsung atau URL release'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # ← Ubah ke 20 (atau 22)
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          # Install PWABuilder
          npm install -g pwabuilder
          
          # Install ImageMagick
          sudo apt-get update
          sudo apt-get install -y imagemagick wget unzip jq
          
          # Verify
          pwabuilder --version || echo "PWABuilder installed"
          node --version
          npm --version

      - name: Download and prepare icon
        run: |
          echo "⬇️ Downloading icon from: ${{ inputs.icon_url }}"
          
          ICON_URL="${{ inputs.icon_url }}"
          
          # Jika URL mengandung /releases/tag/, ambil asset pertama
          if echo "$ICON_URL" | grep -q "/releases/tag/"; then
            echo "🔄 Detected release URL, getting actual icon..."
            
            TAG=$(echo "$ICON_URL" | sed 's/.*\/tag\///')
            echo "📌 Tag: $TAG"
            
            RELEASE_INFO=$(curl -s \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
            
            ICON_ASSET_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("icon") or endswith(".png") or endswith(".jpg")) | .url' | head -1)
            
            if [ -n "$ICON_ASSET_URL" ] && [ "$ICON_ASSET_URL" != "null" ]; then
              echo "✅ Found icon asset: $ICON_ASSET_URL"
              curl -L \
                -H "Accept: application/octet-stream" \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -o icon.png \
                "$ICON_ASSET_URL"
            else
              echo "❌ No icon found in release, using default"
              curl -L -o icon.png "https://via.placeholder.com/512x512/000000/FFFFFF?text=${{ inputs.app_name }}"
            fi
          else
            # Direct download
            curl -L -o icon.png "$ICON_URL"
          fi
          
          # Check if download successful
          if [ ! -f "icon.png" ]; then
            echo "❌ Failed to download icon, using default"
            curl -L -o icon.png "https://via.placeholder.com/512x512/000000/FFFFFF?text=${{ inputs.app_name }}"
          fi
          
          # Check if file is valid image
          echo "🔍 Checking if file is valid image..."
          if ! file icon.png | grep -q "PNG image\|JPEG image"; then
            echo "❌ Downloaded file is not a valid image, using default"
            curl -L -o icon.png "https://via.placeholder.com/512x512/000000/FFFFFF?text=${{ inputs.app_name }}"
          fi
          
          echo "✅ Icon ready"
          
          # Create icons directory
          mkdir -p icons
          cp icon.png icons/icon.png

      - name: Generate APK using PWABuilder
        id: generate_apk
        run: |
          echo "🔨 Generating APK..."
          echo "📱 App Name: ${{ inputs.app_name }}"
          echo "🌐 Web URL: ${{ inputs.web_url }}"
          
          # Create PWA manifest
          cat > manifest.json << EOF
          {
            "name": "${{ inputs.app_name }}",
            "short_name": "${{ inputs.app_name }}",
            "start_url": "${{ inputs.web_url }}",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [
              {
                "src": "icons/icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF
          
          # Build with PWABuilder
          npx pwabuilder build \
            --manifest manifest.json \
            --platform android \
            --output ./output || {
              echo "⚠️ PWABuilder build failed, trying alternative..."
              
              # Alternative: Install and use pwa2apk from GitHub
              echo "🔄 Method 2: Using PWA2APK from GitHub..."
              
              git clone https://github.com/toly1994328/pwa2apk.git
              cd pwa2apk
              npm install
              
              node index.js \
                --url "${{ inputs.web_url }}" \
                --name "${{ inputs.app_name }}" \
                --icon ../icon.png \
                --output ../output
              cd ..
          }
          
          # Find APK
          echo "📂 Searching for APK..."
          APK_FOUND=$(find . -name "*.apk" -type f | head -1)
          
          if [ -n "$APK_FOUND" ] && [ -f "$APK_FOUND" ]; then
            echo "✅ APK found: $APK_FOUND"
            mkdir -p output
            cp "$APK_FOUND" ./output/app-release.apk
            echo "apk_path=./output/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "❌ No APK found"
            echo "📂 Directory structure:"
            find . -type f 2>/dev/null | head -20
            exit 1
          fi

      - name: Verify APK
        run: |
          APK_PATH="${{ steps.generate_apk.outputs.apk_path }}"
          
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found"
            exit 1
          fi
          
          echo "🔍 Verifying APK: $APK_PATH"
          
          APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null || echo "0")
          APK_SIZE_MB=$((APK_SIZE / 1048576))
          
          if [ "$APK_SIZE" -eq 0 ]; then
            echo "❌ APK is empty"
            exit 1
          fi
          
          echo "✅ APK verified (${APK_SIZE_MB} MB)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}-${{ github.run_id }}
          path: ${{ steps.generate_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Build summary
        if: always()
        run: |
          echo "## Web to APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | ${{ inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web URL | ${{ inputs.web_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ APK generated successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Build failed!" >> $GITHUB_STEP_SUMMARY
          fi
