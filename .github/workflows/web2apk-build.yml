name: Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "URL Website"
        required: true
        type: string

      app_name:
        description: "Nama APK"
        required: true
        type: string

      icon_url:
        description: "URL Icon APK"
        required: false
        type: string


jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y zip unzip wget


      - name: Download Android Template
        run: |
          git clone https://github.com/GunzKapotited/android-templete.git android-template || true


      - name: Prepare Project
        run: |
          cd android-template

          sed -i "s|APP_NAME_HERE|${{ inputs.app_name }}|g" ./* 2>/dev/null || true
          sed -i "s|WEB_URL_HERE|${{ inputs.web_url }}|g" ./* 2>/dev/null || true

          if [ ! -z "${{ inputs.icon_url }}" ]; then
            wget "${{ inputs.icon_url }}" -O app_icon.png || true
          fi


      - name: Build APK
        run: |
          cd android-template

          chmod +x gradlew

          ./gradlew assembleRelease


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-apk
          path: android-template/app/build/outputs/apk/release/*.apk
