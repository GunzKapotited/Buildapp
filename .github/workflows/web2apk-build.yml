name: Web2APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website untuk dijadikan APK'
        required: true
        type: string
        default: 'https://example.com'
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
        default: 'MyWebApp'
      icon_url:
        description: 'URL Icon (opsional)'
        required: false
        type: string
        default: ''
      app_id:
        description: 'Package ID (opsional)'
        required: false
        type: string
        default: ''
      version:
        description: 'Versi Aplikasi'
        required: false
        type: string
        default: '1.0.0'
      orientation:
        description: 'Orientasi Layar'
        required: false
        type: choice
        options:
          - default
          - portrait
          - landscape
        default: 'portrait'

env:
  APP_NAME: ${{ github.event.inputs.app_name }}
  WEB_URL: ${{ github.event.inputs.web_url }}
  ICON_URL: ${{ github.event.inputs.icon_url }}
  APP_ID: ${{ github.event.inputs.app_id }}
  VERSION: ${{ github.event.inputs.version }}
  ORIENTATION: ${{ github.event.inputs.orientation }}

jobs:
  build-web2apk:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: |
          npm install -g cordova@latest
          npm install -g cordova-res@latest
          echo "✅ Dependencies installed"
          cordova --version

      - name: Validate inputs
        id: validate
        run: |
          # Validasi URL
          if [[ -z "${{ env.WEB_URL }}" ]]; then
            echo "❌ ERROR: Web URL tidak boleh kosong"
            exit 1
          fi
          
          if [[ ! "${{ env.WEB_URL }}" =~ ^https?:// ]]; then
            echo "❌ ERROR: URL harus diawali dengan http:// atau https://"
            exit 1
          fi
          
          if [[ -z "${{ env.APP_NAME }}" ]]; then
            echo "❌ ERROR: Nama aplikasi tidak boleh kosong"
            exit 1
          fi
          
          # Buat App ID
          if [[ -z "${{ env.APP_ID }}" ]]; then
            APP_ID_CLEAN=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g' | cut -c1-15)
            APP_ID="com.webapp.${APP_ID_CLEAN}"
            echo "APP_ID=$APP_ID" >> $GITHUB_ENV
            echo "✅ App ID: $APP_ID"
          else
            echo "✅ App ID: ${{ env.APP_ID }}"
          fi

      - name: Create Cordova project with proper structure
        run: |
          APP_ID_FIXED="${APP_ID:-com.webapp.myapp}"
          APP_NAME_FIXED="${{ env.APP_NAME }}"
          
          echo "📱 Creating Cordova project: $APP_NAME_FIXED ($APP_ID_FIXED)"
          
          # Buat project dengan cara yang benar
          npx cordova create app "$APP_ID_FIXED" "$APP_NAME_FIXED"
          
          cd app
          
          # Hapus platform lama jika ada
          rm -rf platforms plugins
          
          # Tambahkan platform Android dengan versi spesifik
          cordova platform add android@12.0.0
          
          # Setup config.xml yang benar
          cat > config.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="$APP_ID_FIXED" version="${{ env.VERSION }}" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>$APP_NAME_FIXED</name>
              <description>$APP_NAME_FIXED Web App</description>
              <author email="build@example.com" href="${{ env.WEB_URL }}">Build Team</author>
              <content src="${{ env.WEB_URL }}" />
              
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <allow-navigation href="*" />
              <allow-navigation href="${{ env.WEB_URL }}" />
              
              <preference name="Orientation" value="${{ env.ORIENTATION }}" />
              <preference name="Fullscreen" value="false" />
              <preference name="StatusBarOverlaysWebView" value="false" />
              <preference name="StatusBarBackgroundColor" value="#000000" />
              <preference name="android-minSdkVersion" value="21" />
              <preference name="android-targetSdkVersion" value="34" />
              <preference name="android-compileSdkVersion" value="34" />
              <preference name="android-buildToolsVersion" value="34.0.0" />
              
              <platform name="android">
                  <preference name="AndroidXEnabled" value="true" />
                  <preference name="GradlePluginKotlinEnabled" value="true" />
              </platform>
          </widget>
          EOF
          
          # Buat MainActivity.java yang benar
          mkdir -p platforms/android/app/src/main/java/com/example/app/
          cat > platforms/android/app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          
          import android.os.Bundle;
          import org.apache.cordova.*;
          
          public class MainActivity extends CordovaActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  loadUrl(launchUrl);
              }
          }
          EOF
          
          # Setup www/index.html
          mkdir -p www
          cat > www/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
              <title>$APP_NAME_FIXED</title>
              <style>
                  * { margin:0; padding:0; box-sizing:border-box; }
                  html, body { 
                      width:100%; 
                      height:100%; 
                      overflow:hidden; 
                      background:#000;
                      margin:0;
                      padding:0;
                  }
                  #webview {
                      width:100vw;
                      height:100vh;
                      border:none;
                      position:fixed;
                      top:0;
                      left:0;
                      background:#fff;
                  }
                  .loading {
                      position:fixed;
                      top:50%;
                      left:50%;
                      transform:translate(-50%,-50%);
                      color:#fff;
                      font-family:Arial;
                      font-size:16px;
                      z-index:999;
                  }
              </style>
          </head>
          <body>
              <div class="loading">Loading...</div>
              <iframe id="webview" src="${{ env.WEB_URL }}" allow="geolocation; microphone; camera; payment; autoplay"></iframe>
              <script>
                  document.getElementById('webview').addEventListener('load', function() {
                      document.querySelector('.loading').style.display = 'none';
                  });
                  
                  document.getElementById('webview').addEventListener('error', function() {
                      document.querySelector('.loading').textContent = 'Error loading page';
                  });
              </script>
          </body>
          </html>
          EOF
          
          echo "✅ Cordova project created with proper structure"

      - name: Download and set icon
        if: env.ICON_URL != ''
        run: |
          cd app
          
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
          mkdir -p res/icon/android
          
          echo "📥 Downloading icon..."
          curl -L --max-time 30 "${{ env.ICON_URL }}" -o icon.png || echo "⚠️ Gagal download"
          
          if [[ -f icon.png && $(file icon.png | grep -i image) ]]; then
            # Resize untuk berbagai ukuran
            for size in 512 192 144 96 72 48 36; do
              convert icon.png -resize ${size}x${size} -background transparent -gravity center -extent ${size}x${size} res/icon/android/icon-${size}.png 2>/dev/null || true
            done
            echo "✅ Icon berhasil di-set"
          else
            echo "⚠️ Icon tidak valid, menggunakan default"
          fi

      - name: Build Android APK with proper gradle
        run: |
          cd app
          
          echo "🔨 Building Android APK..."
          
          # Generate debug keystore
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" 2>/dev/null || true
          
          # Build with gradle directly
          echo "📦 Building with Cordova..."
          cordova build android --debug --verbose
          
          # Cek hasil build
          echo "📁 Checking build results..."
          find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webapk-${{ env.APP_NAME }}-${{ github.run_number }}
          path: |
            app/platforms/android/app/build/outputs/apk/debug/*.apk
            app/platforms/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create release
        if: success()
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: web2apk-${{ env.APP_NAME }}-${{ github.run_number }}
          name: Web2APK - ${{ env.APP_NAME }} v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            app/platforms/android/app/build/outputs/apk/debug/*.apk
            app/platforms/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - Show files
        if: always()
        run: |
          echo "📁 Directory structure:"
          ls -la app/ 2>/dev/null || echo "⚠️ No app directory"
          ls -la app/platforms/ 2>/dev/null || echo "⚠️ No platforms directory"
          ls -la app/platforms/android/ 2>/dev/null || echo "⚠️ No android directory"
          find . -name "*.apk" -type f 2>/dev/null || echo "⚠️ No APK files"

      - name: Success notification
        if: success()
        run: |
          echo "✅ Web2APK build BERHASIL!"
          echo "📱 App: ${{ env.APP_NAME }}"
          echo "🌐 URL: ${{ env.WEB_URL }}"
          echo "📦 Download: https://github.com/${{ github.repository }}/releases/tag/web2apk-${{ env.APP_NAME }}-${{ github.run_number }}"

      - name: Failure notification
        if: failure()
        run: |
          echo "❌ Web2APK build GAGAL!"
          echo "📱 App: ${{ env.APP_NAME }}"
          echo "🌐 URL: ${{ env.WEB_URL }}"
          echo ""
          echo "📋 Error log:"
          cat /home/runner/.npm/_logs/*-debug.log 2>/dev/null | tail -20 || echo "No npm logs"

      - name: Cleanup
        if: always()
        run: |
          rm -rf app 2>/dev/null || true
          echo "🧹 Cleanup selesai"
