name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG)'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # HAPUS cache! Karena ga ada package-lock.json
          # cache: 'npm'  ← HAPUS INI!

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          # Install PWABuilder (global, no package.json needed)
          npm install -g pwabuilder
          
          # Install ImageMagick
          sudo apt-get update
          sudo apt-get install -y imagemagick wget unzip jq
          
          # Verify
          pwabuilder --version || echo "PWABuilder installed"

      - name: Download and prepare icon
        run: |
          echo "⬇️ Downloading icon from: ${{ inputs.icon_url }}"
          
          # Download icon
          curl -L -o icon.png "${{ inputs.icon_url }}" || {
            echo "⚠️ Failed to download, using placeholder"
            curl -L -o icon.png "https://via.placeholder.com/512x512/000000/FFFFFF?text=${{ inputs.app_name }}"
          }
          
          # Check if valid image
          if ! file icon.png | grep -q "PNG image\|JPEG image"; then
            echo "⚠️ Not a valid image, using placeholder"
            curl -L -o icon.png "https://via.placeholder.com/512x512/000000/FFFFFF?text=${{ inputs.app_name }}"
          fi
          
          # Create icons directory
          mkdir -p icons
          cp icon.png icons/icon.png
          
          echo "✅ Icon ready"

      - name: Generate APK using PWABuilder
        id: generate_apk
        run: |
          echo "🔨 Generating APK..."
          echo "📱 App Name: ${{ inputs.app_name }}"
          echo "🌐 Web URL: ${{ inputs.web_url }}"
          
          # Create PWA manifest
          cat > manifest.json << EOF
          {
            "name": "${{ inputs.app_name }}",
            "short_name": "${{ inputs.app_name }}",
            "start_url": "${{ inputs.web_url }}",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [
              {
                "src": "icons/icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF
          
          # Create output directory
          mkdir -p output
          
          # Build with PWABuilder
          npx pwabuilder build \
            --manifest manifest.json \
            --platform android \
            --output ./output || {
              echo "⚠️ PWABuilder failed, trying alternative..."
              
              # Alternative: Use pwa2apk from GitHub
              git clone https://github.com/toly1994328/pwa2apk.git
              cd pwa2apk
              npm install
              node index.js \
                --url "${{ inputs.web_url }}" \
                --name "${{ inputs.app_name }}" \
                --icon ../icon.png \
                --output ../output
              cd ..
          }
          
          # Find APK
          APK_FOUND=$(find . -name "*.apk" -type f | head -1)
          
          if [ -n "$APK_FOUND" ] && [ -f "$APK_FOUND" ]; then
            echo "✅ APK found: $APK_FOUND"
            mkdir -p output
            cp "$APK_FOUND" ./output/app-release.apk
            echo "apk_path=./output/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "❌ No APK found"
            exit 1
          fi

      - name: Verify APK
        run: |
          APK_PATH="${{ steps.generate_apk.outputs.apk_path }}"
          
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found"
            exit 1
          fi
          
          APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || echo "0")
          APK_SIZE_MB=$((APK_SIZE / 1048576))
          
          echo "✅ APK verified (${APK_SIZE_MB} MB)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ${{ steps.generate_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 7
