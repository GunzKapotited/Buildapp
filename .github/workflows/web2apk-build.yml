name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG) atau URL Release'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y curl imagemagick zip jq
          # Install Docker
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker $USER
          # Restart Docker
          sudo systemctl restart docker

      - name: Get icon
        run: |
          ICON_URL="${{ inputs.icon_url }}"
          
          echo "🔍 Processing icon URL: $ICON_URL"
          
          if echo "$ICON_URL" | grep -q "/releases/tag/"; then
            echo "📌 Release URL detected, extracting image..."
            
            TAG=$(echo "$ICON_URL" | sed 's/.*\/tag\///' | sed 's/?.*//')
            echo "📌 Tag: $TAG"
            
            RELEASE_DATA=$(curl -s \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
            
            IMAGE_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("\\.(png|jpg|jpeg|ico)$"; "i")) | .browser_download_url' | head -1)
            
            if [ -n "$IMAGE_URL" ] && [ "$IMAGE_URL" != "null" ]; then
              echo "✅ Found image: $IMAGE_URL"
              curl -L -o icon.png "$IMAGE_URL"
            else
              echo "❌ No image found, creating default..."
              convert -size 512x512 xc:black -fill white -gravity center \
                -font Helvetica -pointsize 60 -annotate +0+0 "${{ inputs.app_name }}" \
                icon.png
            fi
          else
            curl -L -o icon.png "$ICON_URL"
          fi
          
          if [ ! -f "icon.png" ] || ! file icon.png | grep -q "PNG image\|JPEG image"; then
            echo "⚠️ Invalid image, creating default..."
            convert -size 512x512 xc:black -fill white -gravity center \
              -font Helvetica -pointsize 60 -annotate +0+0 "${{ inputs.app_name }}" \
              icon.png
          fi
          
          convert icon.png -resize 512x512 -background transparent -gravity center -extent 512x512 icon.png
          
          echo "✅ Icon ready"
          file icon.png

      - name: Build APK with Docker
        run: |
          # Create manifest
          cat > manifest.json << EOF
          {
            "name": "${{ inputs.app_name }}",
            "short_name": "${{ inputs.app_name }}",
            "start_url": "${{ inputs.web_url }}",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF
          
          # Build using Docker image with Android SDK
          docker run --rm \
            -v $(pwd):/app \
            -w /app \
            openjdk:17-jdk-slim \
            sh -c "
              apt-get update && apt-get install -y wget unzip
              # Download bubblewrap
              wget -O bubblewrap.jar https://github.com/GoogleChromeLabs/bubblewrap/releases/download/v1.24.1/bubblewrap.jar || \
              wget -O bubblewrap.jar https://github.com/GoogleChromeLabs/bubblewrap/releases/download/v1.24.0/bubblewrap.jar || \
              wget -O bubblewrap.jar https://github.com/GoogleChromeLabs/bubblewrap/releases/download/v1.23.0/bubblewrap.jar
              
              # Build with bubblewrap
              java -jar bubblewrap.jar init --manifest manifest.json
              java -jar bubblewrap.jar build --output ./output
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ./output/*.apk
          retention-days: 7
