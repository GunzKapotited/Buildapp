name: Web to APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL website yang akan dijadikan APK'
        required: true
        type: string
        default: 'https://example.com'
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
        default: 'MyWebApp'
      icon_url:
        description: 'URL Icon (PNG, minimal 512x512)'
        required: false
        type: string
        default: ''
      package_name:
        description: 'Package Name (com.example.app)'
        required: false
        type: string
        default: 'com.webapp.myapp'
      orientation:
        description: 'Orientasi Layar'
        required: false
        type: choice
        default: 'default'
        options:
          - default
          - portrait
          - landscape
      display_mode:
        description: 'Mode Tampilan'
        required: false
        type: choice
        default: 'standalone'
        options:
          - standalone
          - fullscreen
          - minimal-ui
          - browser

jobs:
  build-web2apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create package.json
        run: |
          npm init -y

      - name: Install Capacitor
        run: |
          npm install @capacitor/cli @capacitor/android @capacitor/core
          npm install -g @capacitor/cli

      - name: Set environment variables
        id: vars
        run: |
          WEB_URL="${{ github.event.inputs.web_url }}"
          DOMAIN=$(echo "$WEB_URL" | sed -E 's|^https?://||' | cut -d'/' -f1)
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "app_name=${{ github.event.inputs.app_name }}" >> $GITHUB_OUTPUT
          echo "package_name=${{ github.event.inputs.package_name }}" >> $GITHUB_OUTPUT
          echo "icon_url=${{ github.event.inputs.icon_url }}" >> $GITHUB_OUTPUT
          echo "orientation=${{ github.event.inputs.orientation }}" >> $GITHUB_OUTPUT
          echo "display_mode=${{ github.event.inputs.display_mode }}" >> $GITHUB_OUTPUT

      - name: Create web directory and files
        run: |
          mkdir -p www
          
          cat > www/manifest.json << EOF
          {
            "name": "${{ steps.vars.outputs.app_name }}",
            "short_name": "${{ steps.vars.outputs.app_name }}",
            "start_url": "${{ steps.vars.outputs.web_url }}",
            "display": "${{ steps.vars.outputs.display_mode }}",
            "orientation": "${{ steps.vars.outputs.orientation }}",
            "background_color": "#ffffff",
            "theme_color": "#1976d2",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          EOF

      - name: Download or create icon
        run: |
          if [ -n "${{ steps.vars.outputs.icon_url }}" ]; then
            wget -O www/icon.png "${{ steps.vars.outputs.icon_url }}" || echo "Icon download failed"
          fi
          
          if [ ! -f www/icon.png ]; then
            echo "Creating default icon..."
            convert -size 512x512 xc:#1976d2 -font DejaVu-Sans -pointsize 120 -fill white \
              -gravity center -annotate 0 "${{ steps.vars.outputs.app_name }}" www/icon.png || true
          fi

      - name: Create splash screen
        run: |
          if command -v convert &> /dev/null; then
            convert -size 1080x1920 xc:#1976d2 -font DejaVu-Sans -pointsize 60 -fill white \
              -gravity center -annotate 0 "${{ steps.vars.outputs.app_name }}" www/splash.png || true
          fi

      - name: Create index.html
        run: |
          cat > www/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <meta name="theme-color" content="#1976d2">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
            <link rel="manifest" href="manifest.json">
            <link rel="icon" href="icon.png">
            <title>APP_NAME_PLACEHOLDER</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { 
                width: 100%; 
                height: 100vh; 
                overflow: hidden;
                background: #ffffff;
              }
              iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
              }
              #loading {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #ffffff;
                z-index: 1000;
                transition: opacity 0.5s ease;
              }
              #loading.hidden {
                opacity: 0;
                pointer-events: none;
              }
              .spinner {
                width: 48px;
                height: 48px;
                border: 4px solid #e0e0e0;
                border-top-color: #1976d2;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
              }
              @keyframes spin {
                to { transform: rotate(360deg); }
              }
              .app-name {
                margin-top: 20px;
                font-family: system-ui, -apple-system, sans-serif;
                font-size: 18px;
                color: #333;
              }
            </style>
          </head>
          <body>
            <div id="loading">
              <div class="spinner"></div>
              <div class="app-name">APP_NAME_PLACEHOLDER</div>
            </div>
            <iframe 
              id="webview"
              src="WEB_URL_PLACEHOLDER"
              allow="camera; microphone; geolocation; payment; clipboard-read; clipboard-write"
              allowfullscreen>
            </iframe>
            <script>
              const loading = document.getElementById('loading');
              const iframe = document.getElementById('webview');
              
              iframe.addEventListener('load', () => {
                setTimeout(() => {
                  loading.classList.add('hidden');
                }, 500);
              });
              
              setTimeout(() => {
                loading.classList.add('hidden');
              }, 10000);
              
              iframe.addEventListener('error', () => {
                loading.innerHTML = \`
                  <div style="text-align:center;padding:20px;">
                    <div style="font-size:48px;margin-bottom:16px;">🌐</div>
                    <h3 style="color:#333;">Failed to load website</h3>
                    <p style="color:#666;margin-top:8px;">Please check your internet connection</p>
                    <button onclick="location.reload()" style="
                      margin-top:20px;
                      padding:10px 30px;
                      background:#1976d2;
                      color:white;
                      border:none;
                      border-radius:8px;
                      font-size:16px;
                      cursor:pointer;
                    ">Retry</button>
                  </div>
                \`;
              });
            </script>
          </body>
          </html>
          EOF
          
          sed -i "s|APP_NAME_PLACEHOLDER|${{ steps.vars.outputs.app_name }}|g" www/index.html
          sed -i "s|WEB_URL_PLACEHOLDER|${{ steps.vars.outputs.web_url }}|g" www/index.html

      - name: Remove existing android folder if exists
        run: |
          if [ -d "android" ]; then
            rm -rf android
          fi

      - name: Initialize Capacitor
        run: |
          npx cap init \
            "${{ steps.vars.outputs.app_name }}" \
            "${{ steps.vars.outputs.package_name }}" \
            --web-dir=www
          
          npx cap add android
          
          cat > android/app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${{ steps.vars.outputs.package_name }}">
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="${{ steps.vars.outputs.app_name }}"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/AppTheme"
                android:usesCleartextTraffic="true"
                android:networkSecurityConfig="@xml/network_security_config">
              <activity
                  android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                  android:name=".MainActivity"
                  android:label="${{ steps.vars.outputs.app_name }}"
                  android:theme="@style/AppTheme.NoActionBarLaunch"
                  android:launchMode="singleTask"
                  android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
              <provider
                  android:name="androidx.core.content.FileProvider"
                  android:authorities="\${applicationId}.fileprovider"
                  android:exported="false"
                  android:grantUriPermissions="true">
                <meta-data
                    android:name="android.support.FILE_PROVIDER_PATHS"
                    android:resource="@xml/file_paths" />
              </provider>
            </application>
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
          </manifest>
          EOF

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">${{ steps.vars.outputs.domain }}</domain>
            </domain-config>
            <base-config cleartextTrafficPermitted="true" />
          </network-security-config>
          EOF

      - name: Update build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
            namespace "${{ steps.vars.outputs.package_name }}"
            compileSdk 33
            defaultConfig {
              applicationId "${{ steps.vars.outputs.package_name }}"
              minSdk 21
              targetSdk 33
              versionCode 1
              versionName "1.0"
              testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
            }
            buildTypes {
              release {
                minifyEnabled true
                proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.debug
              }
            }
          }
          
          repositories {
            google()
            mavenCentral()
          }
          
          dependencies {
            implementation fileTree(include: ['*.jar'], dir: 'libs')
            implementation project(':capacitor-android')
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.webkit:webkit:1.7.0'
            implementation 'androidx.core:core-splashscreen:1.0.0'
          }
          EOF

      - name: Update gradle wrapper to 8.7
        run: |
          cd android
          ./gradlew wrapper --gradle-version=8.7 --distribution-type=all
          cd ..

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon
          cd ..

      - name: Find and rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK at: $APK_PATH"
            mkdir -p output
            cp "$APK_PATH" "output/${{ steps.vars.outputs.app_name }}.apk"
            echo "APK copied to output/${{ steps.vars.outputs.app_name }}.apk"
            echo "apk_path=output/${{ steps.vars.outputs.app_name }}.apk" >> $GITHUB_OUTPUT
          else
            echo "No APK found!"
            find android/app/build/outputs -type f -name "*.apk" || echo "No APK files found"
            exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ steps.vars.outputs.app_name }}
          path: output/*.apk
          retention-days: 30

      - name: Create release and upload APK
        if: always()
        run: |
          if [ -f "output/${{ steps.vars.outputs.app_name }}.apk" ]; then
            TAG="web2apk-$(date +'%Y%m%d-%H%M%S')"
            
            RESPONSE=$(curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/releases" \
              -d "{
                \"tag_name\": \"$TAG\",
                \"name\": \"${{ steps.vars.outputs.app_name }} - Web2APK $TAG\",
                \"draft\": false,
                \"prerelease\": false
              }")
            
            RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
            UPLOAD_URL=$(echo $RESPONSE | jq -r '.upload_url' | sed 's/{?name,label}//')
            
            echo "Release ID: $RELEASE_ID"
            echo "Upload URL: $UPLOAD_URL"
            
            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/vnd.android.package-archive" \
              "$UPLOAD_URL?name=${{ steps.vars.outputs.app_name }}.apk" \
              --data-binary "@output/${{ steps.vars.outputs.app_name }}.apk"
          else
            echo "No APK to upload to release"
          fi

      - name: Display download info
        if: always()
        run: |
          echo "=========================================="
          echo "📱 Web2APK Build Complete!"
          echo "📦 APK: ${{ steps.vars.outputs.app_name }}.apk"
          echo "=========================================="
          echo ""
          echo "📥 Download APK from artifacts or release"
          echo ""
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
