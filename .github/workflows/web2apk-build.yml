name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG)'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'  # ← Pakai Node 16 (kompatibel dengan PWABuilder)

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          # Install PWA2APK dari NPM (bukan PWABuilder)
          npm install -g pwa2apk
          
          # Install ImageMagick
          sudo apt-get update
          sudo apt-get install -y imagemagick wget unzip jq
          
          # Verify
          pwa2apk --version || echo "pwa2apk installed"

      - name: Download and prepare icon
        run: |
          echo "⬇️ Downloading icon from: ${{ inputs.icon_url }}"
          
          ICON_URL="${{ inputs.icon_url }}"
          
          # ============================================
          # FUNCTION: Get actual icon URL from release
          # ============================================
          get_icon_from_release() {
            local url="$1"
            
            local TAG=$(echo "$url" | sed 's/.*\/tag\///' | sed 's/?.*//')
            echo "📌 Extracted tag: $TAG"
            
            local RELEASE_INFO=$(curl -s \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
            
            local ICON_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | test("icon|png|jpg|jpeg"; "i")) | .browser_download_url' | head -1)
            
            if [ -n "$ICON_URL" ] && [ "$ICON_URL" != "null" ]; then
              echo "$ICON_URL"
              return 0
            fi
            
            local ANY_ASSET=$(echo "$RELEASE_INFO" | jq -r '.assets[0].browser_download_url' 2>/dev/null)
            if [ -n "$ANY_ASSET" ] && [ "$ANY_ASSET" != "null" ]; then
              echo "$ANY_ASSET"
              return 0
            fi
            
            return 1
          }
          
          # ============================================
          # Check if URL is a release tag URL
          # ============================================
          if echo "$ICON_URL" | grep -q "/releases/tag/"; then
            echo "🔄 Detected release URL, extracting actual file URL..."
            
            ACTUAL_URL=$(get_icon_from_release "$ICON_URL")
            
            if [ -n "$ACTUAL_URL" ] && [ "$ACTUAL_URL" != "null" ]; then
              ICON_URL="$ACTUAL_URL"
              echo "✅ Found asset URL: $ICON_URL"
            else
              echo "❌ No asset found in release"
              echo "🔄 Creating default icon..."
              
              convert -size 512x512 xc:transparent \
                -fill black -gravity center \
                -font Helvetica -pointsize 80 \
                -annotate +0+0 "${{ inputs.app_name }}" \
                icon.png || {
                  echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > icon.png
                }
              
              echo "✅ Default icon created"
              ls -la icon.png
              exit 0
            fi
          fi
          
          # ============================================
          # Download the icon
          # ============================================
          echo "⬇️ Downloading from: $ICON_URL"
          
          for i in 1 2 3; do
            echo "Attempt $i..."
            if curl -L -o icon.png "$ICON_URL" --fail --connect-timeout 10; then
              echo "✅ Download successful"
              break
            else
              echo "⚠️ Download attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "❌ All download attempts failed"
                echo "🔄 Creating default icon..."
                convert -size 512x512 xc:transparent \
                  -fill black -gravity center \
                  -font Helvetica -pointsize 80 \
                  -annotate +0+0 "${{ inputs.app_name }}" \
                  icon.png || {
                    echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > icon.png
                  }
                echo "✅ Default icon created"
              fi
              sleep 2
            fi
          done
          
          # ============================================
          # Validate icon
          # ============================================
          if [ ! -f "icon.png" ]; then
            echo "❌ No icon file, creating default..."
            convert -size 512x512 xc:transparent \
              -fill black -gravity center \
              -font Helvetica -pointsize 80 \
              -annotate +0+0 "${{ inputs.app_name }}" \
              icon.png
          fi
          
          if ! file icon.png | grep -q "PNG image\|JPEG image"; then
            echo "⚠️ File is not a valid image, creating default..."
            convert -size 512x512 xc:transparent \
              -fill black -gravity center \
              -font Helvetica -pointsize 80 \
              -annotate +0+0 "${{ inputs.app_name }}" \
              icon.png
          fi
          
          # Resize to 512x512
          convert icon.png -resize 512x512 -background transparent -gravity center -extent 512x512 icon.png
          
          echo "✅ Icon ready:"
          file icon.png
          ls -la icon.png

      - name: Generate APK using PWA2APK
        id: generate_apk
        run: |
          echo "🔨 Generating APK..."
          echo "📱 App Name: ${{ inputs.app_name }}"
          echo "🌐 Web URL: ${{ inputs.web_url }}"
          
          # Create output directory
          mkdir -p output
          
          # Use pwa2apk (not PWABuilder)
          pwa2apk \
            --name "${{ inputs.app_name }}" \
            --url "${{ inputs.web_url }}" \
            --icon icon.png \
            --output ./output \
            --package "com.app.${{ github.run_id }}" || {
              echo "⚠️ pwa2apk failed, trying alternative..."
              
              # Alternative: Build with webview
              echo "🔄 Building with simple webview..."
              
              # Create simple Android project
              mkdir -p android/app/src/main
              
              # Create AndroidManifest.xml
              cat > AndroidManifest.xml << EOF
              <?xml version="1.0" encoding="utf-8"?>
              <manifest xmlns:android="http://schemas.android.com/apk/res/android"
                  package="com.app.${{ github.run_id }}">
                  <application
                      android:allowBackup="true"
                      android:icon="@mipmap/ic_launcher"
                      android:label="${{ inputs.app_name }}"
                      android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                      <activity android:name=".MainActivity"
                          android:exported="true">
                          <intent-filter>
                              <action android:name="android.intent.action.MAIN" />
                              <category android:name="android.intent.category.LAUNCHER" />
                          </intent-filter>
                      </activity>
                  </application>
              </manifest>
              EOF
              
              # Install Android build tools
              sudo apt-get install -y android-sdk
              
              echo "⚠️ Alternative build method requires more setup"
              exit 1
          }
          
          # Find APK
          APK_FOUND=$(find . -name "*.apk" -type f | head -1)
          
          if [ -n "$APK_FOUND" ] && [ -f "$APK_FOUND" ]; then
            echo "✅ APK found: $APK_FOUND"
            mkdir -p output
            cp "$APK_FOUND" ./output/app-release.apk
            echo "apk_path=./output/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "❌ No APK found"
            echo "📂 Directory contents:"
            find . -type f 2>/dev/null | head -20
            exit 1
          fi

      - name: Verify APK
        run: |
          APK_PATH="${{ steps.generate_apk.outputs.apk_path }}"
          
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found"
            exit 1
          fi
          
          APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || echo "0")
          APK_SIZE_MB=$((APK_SIZE / 1048576))
          
          echo "✅ APK verified (${APK_SIZE_MB} MB)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ${{ steps.generate_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Build summary
        if: always()
        run: |
          echo "## Web to APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | ${{ inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web URL | ${{ inputs.web_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ APK generated successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Build failed!" >> $GITHUB_STEP_SUMMARY
          fi
