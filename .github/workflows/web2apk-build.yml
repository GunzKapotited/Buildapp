name: Web2APK - DOCKER METHOD (PASTI JALAN)

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build with Docker
        run: |
          docker run --rm \
            -v $(pwd):/app \
            -e WEB_URL="${{ github.event.inputs.web_url }}" \
            -e APP_NAME="${{ github.event.inputs.app_name }}" \
            beevelop/cordova bash -c "
              cd /app
              cordova create app com.example.app \"\$APP_NAME\"
              cd app
              cordova platform add android
              sed -i 's|<content src="index.html" />|<content src=\"\$WEB_URL\" />|' config.xml
              cordova build android
            "
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app/platforms/android/app/build/outputs/apk/**/*.apk
