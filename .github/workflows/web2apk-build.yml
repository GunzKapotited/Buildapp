name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG)'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install -g pwabuilder
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Download icon
        run: |
          curl -L -o icon.png "${{ inputs.icon_url }}" || echo "Download failed"
          convert icon.png -resize 512x512 icon.png

      - name: Generate APK
        id: generate_apk
        run: |
          cat > manifest.json << EOF
          {
            "name": "${{ inputs.app_name }}",
            "short_name": "${{ inputs.app_name }}",
            "start_url": "${{ inputs.web_url }}",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF
          
          pwabuilder build --manifest manifest.json --platform android --output ./output
          
          APK_PATH=$(find ./output -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ${{ steps.generate_apk.outputs.apk_path }}
          retention-days: 7
