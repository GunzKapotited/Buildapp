name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG) atau URL Release'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip imagemagick jq

      - name: Download icon
        run: |
          ICON_URL="${{ inputs.icon_url }}"
          
          echo "🔍 Processing URL: $ICON_URL"
          
          # KALAU URL RELEASE -> AMBIL ASSET GAMBAR
          if echo "$ICON_URL" | grep -q "/releases/tag/"; then
            echo "📌 Detected release URL, extracting image asset..."
            
            TAG=$(echo "$ICON_URL" | sed 's/.*\/tag\///' | sed 's/?.*//')
            echo "📌 Tag: $TAG"
            
            # Ambil data release via API
            RELEASE_DATA=$(curl -s \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
            
            # Cari asset gambar (png/jpg/jpeg)
            IMAGE_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("\\.(png|jpg|jpeg|ico)$"; "i")) | .browser_download_url' | head -1)
            
            if [ -n "$IMAGE_URL" ] && [ "$IMAGE_URL" != "null" ]; then
              echo "✅ Found image asset: $IMAGE_URL"
              echo "⬇️ Downloading image..."
              curl -L -o icon.png "$IMAGE_URL"
            else
              echo "❌ No image found in release!"
              echo "📋 Creating default icon..."
              convert -size 512x512 xc:black -fill white -gravity center \
                -font Helvetica -pointsize 60 -annotate +0+0 "${{ inputs.app_name }}" \
                icon.png
            fi
          else
            # LANGSUNG DOWNLOAD
            echo "⬇️ Downloading from URL..."
            curl -L -o icon.png "$ICON_URL"
          fi
          
          # KALAU GAGAL/GAMBAR GA VALID -> BUAT DEFAULT
          if [ ! -f "icon.png" ] || ! file icon.png | grep -q "PNG image\|JPEG image"; then
            echo "⚠️ Invalid image, creating default icon..."
            convert -size 512x512 xc:black -fill white -gravity center \
              -font Helvetica -pointsize 60 -annotate +0+0 "${{ inputs.app_name }}" \
              icon.png
          fi
          
          # RESIZE
          convert icon.png -resize 512x512 -background transparent -gravity center -extent 512x512 icon.png
          
          echo "✅ Icon ready"
          file icon.png

      - name: Build APK with PWA CLI
        run: |
          # Download PWA Builder CLI
          wget -O pwabuilder https://github.com/pwa-builder/pwabuilder-cli/releases/latest/download/pwabuilder-cli-linux
          chmod +x pwabuilder
          
          cat > manifest.json << EOF
          {
            "name": "${{ inputs.app_name }}",
            "short_name": "${{ inputs.app_name }}",
            "start_url": "${{ inputs.web_url }}",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF
          
          ./pwabuilder build --manifest manifest.json --platform android --output ./output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ./output/*.apk
          retention-days: 7
