name: Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: false
        type: string
        default: 'com.web2apk.app'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
          
      - name: Build APK
        run: |
          # Install Capacitor
          npm install -g @capacitor/cli @capacitor/android @capacitor/core
          
          # Buat project
          mkdir app && cd app
          
          # Web page
          echo '<!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>${{ github.event.inputs.app_name }}</title>
          </head>
          <body style="margin:0;padding:0;height:100vh;overflow:hidden;">
            <iframe src="${{ github.event.inputs.web_url }}" style="width:100%;height:100%;border:none;"></iframe>
          </body>
          </html>' > www/index.html
          
          # Init Capacitor
          npm init -y
          npx cap init "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.package_name }}"
          npx cap add android
          npx cap sync android
          
          # Build APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cd ../..
          
          # Copy APK
          mkdir -p output
          cp app/android/app/build/outputs/apk/debug/app-debug.apk output/app.apk || echo "No APK found"
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: output/*
          
      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: web2apk-${{ github.run_number }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
