name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL Icon (PNG/JPG) atau URL Release'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install -g pwabuilder
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Download icon
        run: |
          ICON_URL="${{ inputs.icon_url }}"
          
          # KALAU URL RELEASE -> AMBIL ASSET NYA
          if echo "$ICON_URL" | grep -q "/releases/tag/"; then
            echo "🔍 Detected release URL, extracting icon..."
            
            TAG=$(echo "$ICON_URL" | sed 's/.*\/tag\///')
            
            # Ambil daftar assets dari release
            ASSETS=$(curl -s \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
            
            # Cari file gambar (png/jpg/jpeg)
            DOWNLOAD_URL=$(echo "$ASSETS" | jq -r '.assets[] | select(.name | test("\\.(png|jpg|jpeg)$"; "i")) | .browser_download_url' | head -1)
            
            if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
              echo "✅ Found icon: $DOWNLOAD_URL"
              curl -L -o icon.png "$DOWNLOAD_URL"
            else
              echo "❌ No image found in release, creating default..."
              convert -size 512x512 xc:black -fill white -gravity center \
                -font Helvetica -pointsize 60 -annotate +0+0 "${{ inputs.app_name }}" \
                icon.png
            fi
          else
            # LANGSUNG DOWNLOAD
            curl -L -o icon.png "$ICON_URL" || {
              echo "Download failed, creating default..."
              convert -size 512x512 xc:black -fill white -gravity center \
                -font Helvetica -pointsize 60 -annotate +0+0 "${{ inputs.app_name }}" \
                icon.png
            }
          fi
          
          # Resize
          convert icon.png -resize 512x512 -background transparent -gravity center -extent 512x512 icon.png

      - name: Generate APK
        id: generate_apk
        run: |
          cat > manifest.json << EOF
          {
            "name": "${{ inputs.app_name }}",
            "short_name": "${{ inputs.app_name }}",
            "start_url": "${{ inputs.web_url }}",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF
          
          pwabuilder build --manifest manifest.json --platform android --output ./output
          
          APK_PATH=$(find ./output -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ${{ steps.generate_apk.outputs.apk_path }}
          retention-days: 7
