name: Web2APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website untuk dijadikan APK'
        required: true
        type: string
        default: 'https://example.com'
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
        default: 'MyWebApp'
      icon_url:
        description: 'URL Icon (opsional)'
        required: false
        type: string
        default: ''
      app_id:
        description: 'Package ID (opsional)'
        required: false
        type: string
        default: ''
      version:
        description: 'Versi Aplikasi'
        required: false
        type: string
        default: '1.0.0'
      orientation:
        description: 'Orientasi Layar'
        required: false
        type: choice
        options:
          - default
          - portrait
          - landscape
        default: 'portrait'

env:
  APP_NAME: ${{ github.event.inputs.app_name }}
  WEB_URL: ${{ github.event.inputs.web_url }}
  ICON_URL: ${{ github.event.inputs.icon_url }}
  APP_ID: ${{ github.event.inputs.app_id }}
  VERSION: ${{ github.event.inputs.version }}
  ORIENTATION: ${{ github.event.inputs.orientation }}

jobs:
  build-web2apk:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: |
          npm install -g cordova
          npm install -g cordova-res
          npm install -g cordova-android

      - name: Validate inputs
        id: validate
        run: |
          # Validasi URL
          if [[ -z "${{ env.WEB_URL }}" ]]; then
            echo "❌ ERROR: Web URL tidak boleh kosong"
            exit 1
          fi
          
          # Validasi format URL
          if [[ ! "${{ env.WEB_URL }}" =~ ^https?:// ]]; then
            echo "❌ ERROR: URL harus diawali dengan http:// atau https://"
            exit 1
          fi
          
          # Validasi nama aplikasi
          if [[ -z "${{ env.APP_NAME }}" ]]; then
            echo "❌ ERROR: Nama aplikasi tidak boleh kosong"
            exit 1
          fi
          
          # Buat App ID jika tidak disediakan
          if [[ -z "${{ env.APP_ID }}" ]]; then
            APP_ID="com.webapp.$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')"
            echo "APP_ID=$APP_ID" >> $GITHUB_ENV
            echo "✅ App ID otomatis: $APP_ID"
          else
            echo "✅ App ID: ${{ env.APP_ID }}"
          fi
          
          echo "✅ Validasi berhasil"

      - name: Create Cordova project
        run: |
          APP_ID_FIXED="${APP_ID:-com.webapp.myapp}"
          cordova create app "$APP_ID_FIXED" "${{ env.APP_NAME }}"
          cd app
          
          # Tambahkan platform Android
          cordova platform add android@latest
          
          # Setup config.xml
          cat > config.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="$APP_ID_FIXED" version="${{ env.VERSION }}" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>${{ env.APP_NAME }}</name>
              <description>Web App ${{ env.APP_NAME }}</description>
              <author email="build@example.com" href="${{ env.WEB_URL }}">Build Team</author>
              <content src="${{ env.WEB_URL }}" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <allow-navigation href="*" />
              <preference name="Orientation" value="${{ env.ORIENTATION }}" />
              <preference name="Fullscreen" value="false" />
              <preference name="StatusBarOverlaysWebView" value="false" />
              <preference name="StatusBarBackgroundColor" value="#000000" />
              <preference name="android-minSdkVersion" value="21" />
              <preference name="android-targetSdkVersion" value="34" />
              <preference name="android-compileSdkVersion" value="34" />
              <preference name="android-buildToolsVersion" value="34.0.0" />
          </widget>
          EOF
          
          # Buat file index.html minimal
          mkdir -p www
          cat > www/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
              <title>${{ env.APP_NAME }}</title>
              <style>
                  body { margin:0; padding:0; overflow:hidden; }
                  iframe { 
                      width:100vw; 
                      height:100vh; 
                      border:none; 
                      position:fixed;
                      top:0;
                      left:0;
                  }
              </style>
          </head>
          <body>
              <iframe src="${{ env.WEB_URL }}" allow="geolocation; microphone; camera; payment; autoplay" loading="lazy"></iframe>
              <script>
                  // Reload iframe when connection restored
                  window.addEventListener('online', () => {
                      document.querySelector('iframe').src = '${{ env.WEB_URL }}';
                  });
              </script>
          </body>
          </html>
          EOF
          
          echo "✅ Cordova project created"

      - name: Download and set icon
        if: env.ICON_URL != ''
        run: |
          cd app
          mkdir -p res/icon/android
          
          echo "📥 Downloading icon from: ${{ env.ICON_URL }}"
          curl -L "${{ env.ICON_URL }}" -o icon.png
          
          if [[ ! -f icon.png ]]; then
            echo "⚠️ Gagal download icon, menggunakan default"
          else
            # Resize untuk berbagai ukuran
            for size in 192 144 96 72 48 36; do
              convert icon.png -resize ${size}x${size} -background transparent -gravity center -extent ${size}x${size} res/icon/android/icon-${size}.png
            done
            
            # Copy sebagai icon utama
            cp icon.png res/icon/android/icon.png
            cp icon.png www/img/icon.png 2>/dev/null || mkdir -p www/img && cp icon.png www/img/icon.png
            echo "✅ Icon berhasil di-set"
          fi

      - name: Build Android APK
        run: |
          cd app
          
          # Build release
          cordova build android --release -- --keystore=../debug.keystore --alias=androiddebugkey --storepass=android --keypass=android
          
          # Jika build release gagal, coba debug
          if [[ ! -f platforms/android/app/build/outputs/apk/release/app-release.apk ]]; then
            echo "⚠️ Build release gagal, mencoba debug..."
            cordova build android --debug
          fi

      - name: Prepare debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
          echo "✅ Debug keystore created"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webapk-${{ env.APP_NAME }}
          path: |
            app/platforms/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create release
        if: success()
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: web2apk-${{ env.APP_NAME }}-${{ github.run_number }}
          name: Web2APK - ${{ env.APP_NAME }} v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            app/platforms/android/app/build/outputs/apk/release/*.apk
            app/platforms/android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send success notification
        if: success()
        run: |
          echo "✅ Web2APK build berhasil!"
          echo "📱 App: ${{ env.APP_NAME }}"
          echo "🌐 URL: ${{ env.WEB_URL }}"
          echo "📦 Release: ${{ steps.create_release.outputs.url }}"

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ Web2APK build gagal!"
          echo "📱 App: ${{ env.APP_NAME }}"
          echo "🌐 URL: ${{ env.WEB_URL }}"
          echo "🔍 Periksa logs di atas untuk detail error"

      - name: Cleanup
        if: always()
        run: |
          cd app 2>/dev/null && cordova clean 2>/dev/null || true
          rm -rf app 2>/dev/null || true
          echo "🧹 Cleanup selesai"
