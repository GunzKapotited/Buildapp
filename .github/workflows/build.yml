name: Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      release_url:
        description: 'Release URL untuk download ZIP'
        required: true
        type: string
      tag:
        description: 'Tag untuk release'
        required: true
        type: string
      build_type:
        description: 'Tipe Build (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      - name: Download project ZIP
        run: |
          echo "📥 Downloading project from: ${{ inputs.release_url }}"
          wget -O project.zip "${{ inputs.release_url }}"
          unzip -q project.zip -d project
          ls -la project/

      - name: Verify Flutter project
        run: |
          cd project
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          echo "✅ pubspec.yaml found"

      - name: Get dependencies
        run: |
          cd project
          flutter pub get

      - name: Build APK
        run: |
          cd project
          echo "🔨 Building ${{ inputs.build_type }} APK..."
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Verify APK
        run: |
          cd project
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          else
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          fi
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found at: $APK_PATH"
            echo "📦 Size: $(du -h $APK_PATH | cut -f1)"
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build_type }}
          path: project/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup
        run: |
          rm -rf project project.zip
